spring:
  application:
    name: indiene-api
  datasource:
    url: jdbc:postgresql://localhost:5432/indiene
    username: indiene
    password: indiene
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:troque-este-segredo-para-um-valor-com-pelo-menos-32-bytes-em-producao}
  expiration: 86400000
