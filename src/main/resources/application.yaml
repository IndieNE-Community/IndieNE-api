spring:
  application:
    name: indiene-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/indiene}
    username: ${SPRING_DATASOURCE_USERNAME:indiene}
    password: ${SPRING_DATASOURCE_PASSWORD:indiene}

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:troque-este-segredo-para-um-valor-com-pelo-menos-32-bytes-em-producao}
  expiration: 86400000